services:
  redis:
    image: redis:7-alpine
    container_name: flashmemory-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flashmemory-backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        VITE_API_BASE: /api
        VITE_WS_URL: /ws
    container_name: flashmemory-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis-data:
