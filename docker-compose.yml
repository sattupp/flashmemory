version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: flashmemory-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flashmemory-backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: flashmemory-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://localhost:8080/api
      - VITE_WS_URL=http://localhost:8080/ws
    depends_on:
      - backend

volumes:
  redis-data:
