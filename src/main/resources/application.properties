spring.application.name=flashmemory

# Redis connection (Docker: redis:6379, local: localhost:6379)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Connection pool settings (Lettuce uses connection pools for performance)
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# App settings
flashmemory.decay.interval-seconds=30
flashmemory.decay.factor=0.95
flashmemory.max-memories-per-namespace=1000

# Logging
logging.level.com.flashmemory=DEBUG
